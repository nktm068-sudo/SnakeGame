<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eda.vkusno — Кулинарная Энциклопедия ИИ</title>
    <link rel="icon" type="image/png" href="varenik (1).png">
    
    <style>
            :root {
            --bg-main: #f5f6fa;       /* Светлый фон сайта вместо черного */
            --bg-card: #ffffff;       /* Белые карточки рецептов */
            --bg-dark: #eef2f3;       /* Светло-серый инпут для поиска */
            --color-primary: #2ed573;    /* Сочный зеленый вместо красного */
            --color-secondary: #ffaf40;  /* Теплый оранжевый для ингредиентов */
            --color-text-main: #2f3542;  /* Темный читаемый текст для букв */
            --color-text-muted: #747d8c; /* Серый текст для мелких деталей */
        }

        body {
            background-color: var(--bg-main);
            color: var(--color-text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Общая фиксированная шапка сайта */
        .fixed-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); /* Легкая тень для светлой темы */
        }

        header {
            background-color: var(--color-primary);
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ffffff;
        }

        /* НАСТРОЙКИ СВЕТЛОГО ИНПУТА ПОИСКА ПОД ЧЕРНУЮ ЛУПУ */
       #search-input {
    width: 100%;
    padding: 12px 20px 12px 45px !important; /* Добавили отступ слева, чтобы текст не залезал на лупу */
    border-radius: 25px;
    border: 2px solid rgba(0, 0, 0, 0.05);
    background-color: var(--bg-dark);
    color: var(--color-text-main);
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
    transition: all 0.3s ease;
    text-align: left;
    
    /* Настройки картинки лупы */
    background-image: url('https://nktm068-sudo.github.io/eda.vkusno/search.png') !important;
    background-repeat: no-repeat;
    background-position: 16px center !important;
    background-size: 18px 18px;
}

            /* Ссылка на твою иконку (собери без пробелов, когда будешь вставлять) */
            background-image: url('https://nktm068-sudo.github.io/eda.vkusno/search.png');
            background-repeat: no-repeat;
            background-position: 16px center;
            background-size: 18px 18px;
        }

        /* Зеленое свечение при клике на поиск */
        #search-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.4);
            background-color: #ffffff;
        }

        #navigation {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 1000px;
        }

        .nav-btn {
            background-color: var(--bg-card);
            color: var(--color-text-main);
            border: 2px solid rgba(0, 0, 0, 0.05);
            padding: 8px 18px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        /* Зеленый ховер для кнопок */
        .nav-btn:hover {
            background-color: var(--color-primary);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(46, 213, 115, 0.2);
        }

        .nav-btn.active {
            background-color: var(--color-primary);
            color: #ffffff;
            border-color: transparent;
        }

        #recipes-container {
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 280px; 
            margin-bottom: 60px;
        }

        /* Светлые карточки рецептов */
        .recipe-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06); /* Мягкая аккуратная тень */
            border-left: 8px solid var(--color-primary);
            animation: fadeIn 0.4s ease-out;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .recipe-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-card h2 {
            margin-top: 0;
            color: var(--color-primary);
            font-size: 28px;
            font-weight: 800;
            border-bottom: 2px solid rgba(46, 213, 115, 0.1);
            padding-bottom: 10px;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        /* Приятный пастельный фон под ингредиенты */
        .ingredients {
            background-color: #f1f2f6;
            padding: 16px 22px;
            border-radius: 10px;
            font-style: italic;
            margin: 20px 0;
            border-left: 4px solid var(--color-secondary);
            font-size: 16px;
            line-height: 1.6;
            color: #57606f;
        }

        .ingredients strong {
            color: var(--color-secondary);
            font-style: normal;
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .steps {
            line-height: 1.8;
            font-size: 17px;
            color: #57606f; /* Темно-серый текст шагов, чтобы глаза не уставали */
            white-space: pre-line;
        }

        /* АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 768px) {
            header { padding: 12px 0; }
            header h1 { font-size: 26px; }
            .fixed-top { padding-bottom: 10px; }
            
            #search-input { 
                font-size: 14px; 
                padding: 10px 15px 10px 48px !important;
                background-position: 15px center;
            }
            
            #navigation { margin-top: 10px; gap: 8px; }
            .nav-btn { padding: 8px 16px; font-size: 14px; }
            #recipes-container { gap: 15px; width: 95%; }
            
            .recipe-card h2 { 
                font-size: 22px; 
                overflow-wrap: break-word;
                word-wrap: break-word;
            }
            
            .recipe-card { padding: 18px; border-left-width: 5px; }
            .ingredients { font-size: 14px; padding: 10px; }
            .steps { font-size: 15px; }
        }

    </style>
</head>
<body>

    <!-- Шапка и навигация зафиксированы здесь -->
        <!-- Общий фиксированный блок для всей шапки сайта -->
    <div class="fixed-top">
        <header>
            <h1>🍕 eda.vkusno</h1>
        </header>

        <!-- Поле умного поиска -->
      <div style="margin-top: 15px; width: 90%; max-width: 500px; position: relative;">
          <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Поиск...">
          <button id="clear-search" onclick="clearSearchField()" style="display: none; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; font-weight: bold; color: var(--color-text-main); cursor: pointer; padding: 0; line-height: 1;">✕</button>
      </div>

        <div id="navigation">
            <button class="nav-btn active" onclick="showHome(this)">🏠 Главная</button>
            <button class="nav-btn" onclick="showCategory('soups', this)">🍲 Супы</button>
            <button class="nav-btn" onclick="showCategory('potatoes', this)">🥔 Картошка</button>
            <button class="nav-btn" onclick="showCategory('pizzas', this)">🍕 Пицца</button>
            <button class="nav-btn" onclick="showCategory('burgers', this)">🍔 Бургеры</button>
            <button class="nav-btn" onclick="showCategory('desserts', this)">🍦 Десерты</button>
               <button class="nav-btn" onclick="showCategory('drinks', this)">🍹 Напитки</button>
            <button class="nav-btn" style="background-color: #34495e;" onclick="showThanks(this)">❤️ Благодарность</button>
        </div>
    </div>


    <div id="recipes-container"></div>

    <script>
           let cachedData = null;

        async function loadData() {
            if (cachedData) return cachedData;
            try {
                const response = await fetch('recipes.json');
                cachedData = await response.json();
                return cachedData;
            } catch (error) {
                document.getElementById("recipes-container").innerHTML = "<h3>Ошибка загрузки книги рецептов.</h3>";
                return null;
            }
        }

        // Функция для отображения Главной страницы сайта
        function showHome(buttonElement) {
            const headerBlock = document.querySelector('.fixed-top');
            headerBlock.style.position = "fixed";

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            const container = document.getElementById("recipes-container");
            container.innerHTML = `
                <div class="recipe-card" style="border-left-color: #2ed573; text-align: center; animation: fadeIn 0.4s ease-out;">
                    <h2 style="border: none; padding: 0;">Добро пожаловать в eda.vkusno! 🍳</h2>
                    <p style="font-size: 18px; color: #57606f; line-height: 1.6;">
                        Не знаете, что приготовить сегодня? Пускай искусственный интеллект сделает выбор за вас! 
                        Нажмите на кнопку ниже, и ИИ выберет случайное блюдо из нашей огромной кулинарной книги.
                    </p>
                    <br>
                    <button onclick="getRandomRecipe()" style="background-color: #ffaf40; color: white; border: none; padding: 15px 35px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(255, 175, 64, 0.4); transition: all 0.2s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        🎲 Найти случайное блюдо!
                    </button>
                </div>
            `;

            const headerHeight = headerBlock.offsetHeight;
            container.style.marginTop = (headerHeight + 20) + "px";
        }

        // Алгоритм генерации абсолютно любого случайного рецепта из всех категорий
        async function getRandomRecipe() {
            const container = document.getElementById("recipes-container");
            const data = await loadData();
            if (!data) return;

            let allRecipes = [];
            for (let category in data) {
                data[category].forEach(recipe => {
                    recipe.categoryName = category; 
                    allRecipes.push(recipe);
                });
            }

            const randomIndex = Math.floor(Math.random() * allRecipes.length);
            const randomRecipe = allRecipes[randomIndex];

            container.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <button onclick="getRandomRecipe()" style="background-color: #2ed573; color: white; border: none; padding: 10px 25px; font-size: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 12px rgba(46, 213, 115, 0.3);">
                        🔄 Выбрать другое блюдо
                    </button>
                </div>
                <div class="recipe-card" style="animation: fadeIn 0.4s ease-out;">
                    <span style="background-color: #ffaf40; color: #fff; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 10px; text-transform: uppercase;">${randomRecipe.categoryName}</span>
                    <h2 style="margin-top: 10px;">${randomRecipe.name}</h2>
                    <div class="ingredients"><strong>Что понадобится:</strong> ${randomRecipe.ingredients}</div>
                    <div class="steps"><strong>Пошаговое руководство от ИИ:</strong><br>${randomRecipe.steps}</div>
                </div>
            `;
        }

        async function showCategory(category, buttonElement) {
            const headerBlock = document.querySelector('.fixed-top');
            headerBlock.style.position = "fixed";

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            const container = document.getElementById("recipes-container");
            container.innerHTML = "<h3>ИИ открывает нужную страницу...</h3>";

            const data = await loadData();
            if (!data) return;

            container.innerHTML = "";
            const recipes = data[category] || [];
            
            recipes.forEach(recipe => {
                const card = document.createElement("div");
                card.className = "recipe-card";
                card.innerHTML = `
                    <h2>${recipe.name}</h2>
                    <div class="ingredients"><strong>Что понадобится:</strong> ${recipe.ingredients}</div>
                    <div class="steps"><strong>Пошаговое руководство от ИИ:</strong><br>${recipe.steps}</div>
                `;
                container.appendChild(card);
            });

            const headerHeight = headerBlock.offsetHeight;
            container.style.marginTop = (headerHeight + 20) + "px";
        }

        function showThanks(buttonElement) {
            const headerBlock = document.querySelector('.fixed-top');
            headerBlock.style.position = "absolute";

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            const container = document.getElementById("recipes-container");
            container.innerHTML = `
                <div class="recipe-card" style="border-left-color: #ffca28; animation: fadeIn 0.4s ease-out;">
                    <h2 style="color: #ffca28;">Project history and thanks to Google 🚀</h2>
                    <div class="steps">
                        Hello! My name is <strong>Nikita, I'm 8 years old</strong>. 
                        I came up with and created this website, <strong>eda.vkusno</strong>, myself, while it was snowing outside in May.
                        <br><br>
                        I want to say a huge thank you to <strong>Google for the creation of the artificial intelligence Gemini</strong>! 
                        Together with the Gemini neural network, we wrote this entire code from scratch, fixed a bunch of bugs, set up a smart search with typo protection, and launched the website online on GitHub Pages. 
                        <br><br>
                        Creating programs with AI is a joy. Thanks for this awesome lifesaver! 
                    </div>
                </div>
            `;

            const headerHeight = headerBlock.offsetHeight;
            container.style.marginTop = (headerHeight + 20) + "px";
        }

        window.onload = () => {
            const firstBtn = document.querySelector('.nav-btn');
            showHome(firstBtn);
        };

        function levDistance(s1, s2) {
            s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
            let costs = new Array();
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i == 0) costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (s1.charAt(i - 1) != s2.charAt(j - 1))
                                newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        function isMatch(queryWord, targetText) {
            if (targetText.toLowerCase().includes(queryWord.toLowerCase())) return true;
            const targetWords = targetText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
            
            for (let word of targetWords) {
                if (word.length < 4) continue;
                let maxErrors = word.length > 6 ? 2 : 1;
                if (levDistance(queryWord, word) <= maxErrors) return true;
            }
            return false;
        }

        async function handleSearch(query) {
                const clearBtn = document.getElementById("clear-search");
    if (clearBtn) clearBtn.style.display = query.trim() ? "block" : "none";
            const container = document.getElementById("recipes-container");
            if (!query.trim()) {
                const activeBtn = document.querySelector('.nav-btn.active');
                const categories = ['soups', 'potatoes', 'pizzas', 'burgers', 'desserts', 'drinks'];
                const index = Array.from(document.querySelectorAll('.nav-btn')).indexOf(activeBtn);
                showCategory(categories[index], activeBtn);
                return;
            }

            const data = await loadData();
            if (!data) return;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            container.innerHTML = "";

            const queryWords = query.trim().split(/\s+/);
            let foundAny = false;

            for (let category in data) {
                data[category].forEach(recipe => {
                    let matchAllWords = queryWords.every(qWord => 
                        isMatch(qWord, recipe.name) || isMatch(qWord, recipe.ingredients)
                    );

                    if (matchAllWords) {
                        foundAny = true;
                        const card = document.createElement("div");
                        card.className = "recipe-card";
                        card.innerHTML = `
                            <span style="background-color: var(--color-primary); color: #fff; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 10px; text-transform: uppercase;">${category}</span>
                            <h2 style="margin-top: 10px;">${recipe.name}</h2>
                            <div class="ingredients"><strong>Что понадобится:</strong> ${recipe.ingredients}</div>
                            <div class="steps"><strong>Пошаговое руководство от ИИ:</strong><br>${recipe.steps}</div>
                        `;
                        container.appendChild(card);
                    }
                });
            }

            if (!foundAny) {
                container.innerHTML = "<h3 style='text-align: center; color: var(--color-text-muted);'>ИИ ничего не нашёл. Попробуйте изменить запрос.</h3>";
            }
        }
function clearSearchField() {
    const input = document.getElementById("search-input");
    const clearBtn = document.getElementById("clear-search");
    
    if (input) input.value = "";
    if (clearBtn) clearBtn.style.display = "none";
    
    const activeBtn = document.querySelector('.nav-btn.active');
    
    if (activeBtn) {
        activeBtn.click();
    } else {
        const firstBtn = document.querySelector('.nav-btn');
        if (firstBtn) firstBtn.click();
    }
}

    </script>
</body>
</html>
