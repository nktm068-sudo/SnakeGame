                },
                {
                    name: "Хрустящий яблочный крамбл с овсяными хлопьями",
                    ingredients: "Свежие яблоки (крупные) — 2 шт, овсяные хлопья (долгого варения) — 4 ст.л., мука — 2 ст.л., сахар — 2 ст.л., сливочное масло (холодное) — 40 г, молотая корица — 0.5 ч.л.",
                    steps: "1. Яблоки вымойте, удалите сердцевину с семечками и нарежьте мякоть небольшими кубиками. Кожуру можно оставить.<br>2. Выложите яблоки на дно небольшой формы для запекания, равномерно посыпьте их корицей и одной столовой ложкой сахара. Перемешайте прямо в форме.<br>3. В отдельную миску насыпьте овсяные хлопья, муку и оставшуюся столовую ложку сахара. Достаньте из холодильника холодное сливочное масло, нарежьте его кусочками и добавьте к сухой смеси.<br>4. Руками быстро перетрите масло с хлопьями и мукой, чтобы получилась рассыпчатая крупная крошка. Делать это нужно быстро, чтобы масло не растаяло от тепла рук.<br>5. Равномерно засыпьте получившейся овсяной крошкой слой яблок в форме.<br>6. Поставьте форму в разогретую до 180°C духовку на 20-25 минут. Хлопья сверху станут золотистыми и хрустящими, а яблоки снизу пустят сок и станут мягкими, как мармелад. Подавать можно теплым."
                }
            ]
        };

        function showCategory(category, buttonElement) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            const container = document.getElementById("recipes-container");
            container.innerHTML = "";

            const recipes = DATA[category];
            
            recipes.forEach(recipe => {
                const card = document.createElement("div");
                card.className = "recipe-card";
                card.innerHTML = `
                    <h2>${recipe.name}</h2>
                    <div class="ingredients"><strong>Что понадобится:</strong> ${recipe.ingredients}</div>
                    <div class="steps"><strong>Пошаговое руководство от ИИ:</strong><br>${recipe.steps}</div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = () => {
            const firstBtn = document.querySelector('.nav-btn');
            showCategory('soups', firstBtn);
        };
    </script>
</body>
</html>
