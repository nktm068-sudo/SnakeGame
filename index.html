<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eda.vkusno — Кулинарная Энциклопедия ИИ</title>
    <style>
        :root {
            --bg-main: #14161d;
            --bg-card: #202430;
            --bg-dark: #0d0f14;
            --color-primary: #ff4757;
            --color-secondary: #ffca28;
            --color-text-main: #ecf0f1;
            --color-text-muted: #a4b0be;
        }

        body {
            background-color: var(--bg-main);
            color: var(--color-text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--color-primary);
            width: 100%;
            text-align: center;
            padding: 30px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        #navigation {
            margin: 35px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 1000px;
        }

        .nav-btn {
            background-color: var(--bg-card);
            color: var(--color-text-main);
            border: 2px solid transparent;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .nav-btn:hover {
            background-color: var(--color-primary);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255, 71, 87, 0.3);
        }

        .nav-btn.active {
            background-color: var(--color-primary);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #recipes-container {
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 60px;
        }

        .recipe-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            border-left: 8px solid var(--color-primary);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-card h2 {
            margin-top: 0;
            color: var(--color-primary);
            font-size: 28px;
            font-weight: 800;
            border-bottom: 2px solid rgba(255, 71, 87, 0.1);
            padding-bottom: 10px;
        }

        .ingredients {
            background-color: var(--bg-dark);
            padding: 16px 22px;
            border-radius: 10px;
            font-style: italic;
            margin: 20px 0;
            border-left: 4px solid var(--color-secondary);
            font-size: 16px;
            line-height: 1.6;
        }

        .ingredients strong {
            color: var(--color-secondary);
            font-style: normal;
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .steps {
            line-height: 1.8;
            font-size: 17px;
            color: #f1f2f6;
            white-space: pre-line; /* Чтобы переносы строк из JSON отображались красиво */
        }

        .steps strong {
            color: var(--color-primary);
            font-size: 19px;
            display: block;
            margin-bottom: 10px;
        }

        footer {
            margin-top: auto;
            background-color: var(--bg-dark);
            width: 100%;
            text-align: center;
            padding: 20px 0;
            color: var(--color-text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍕 eda.vkusno</h1>
    </header>

    <div id="navigation">
        <button class="nav-btn active" onclick="showCategory('soups', this)">🍲 Супы</button>
        <button class="nav-btn" onclick="showCategory('potatoes', this)">🥔 Картошка</button>
        <button class="nav-btn" onclick="showCategory('pizzas', this)">🍕 Пицца</button>
        <button class="nav-btn" onclick="showCategory('burgers', this)">🍔 Бургеры</button>
        <button class="nav-btn" onclick="showCategory('desserts', this)">🍦 Десерты</button>
    </div>

    <div id="recipes-container"></div>

    <footer>
        &copy; 2026 eda.vkusno — Шеф-повар ИИ. Все права защищены.
    </footer>

    <script>
        let cachedData = null;

        async function loadData() {
            if (cachedData) return cachedData;
            try {
                // Загружаем базу из отдельного внешнего файла
                const response = await fetch('recipes.json');
                cachedData = await response.json();
                return cachedData;
            } catch (error) {
                document.getElementById("recipes-container").innerHTML = "<h3>Ошибка загрузки книги рецептов.</h3>";
                return null;
            }
        }

        async function showCategory(category, buttonElement) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            const container = document.getElementById("recipes-container");
            container.innerHTML = "<h3>ИИ открывает нужную страницу...</h3>";

            const data = await loadData();
            if (!data) return;

            container.innerHTML = "";
            const recipes = data[category] || [];
            
            recipes.forEach(recipe => {
                const card = document.createElement("div");
                card.className = "recipe-card";
                card.innerHTML = `
                    <h2>${recipe.name}</h2>
                    <div class="ingredients"><strong>Что понадобится:</strong> ${recipe.ingredients}</div>
                    <div class="steps"><strong>Пошаговое руководство от ИИ:</strong><br>${recipe.steps}</div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = () => {
            const firstBtn = document.querySelector('.nav-btn');
            showCategory('soups', firstBtn);
        };
    </script>
</body>
</html>
