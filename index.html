<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка</title>
    <style>
        body {
            background-color: #141821;
            color: #ecf0f1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #score-board {
            background-color: #222b38;
            width: 640px;
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        #game-container {
            position: relative;
            width: 640px;
            height: 440px;
        }
        canvas {
            background-color: #141821;
            border: 2px solid #222b38;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }
        #overlay h1 { color: #e74c3c; margin: 0 0 10px 0; font-size: 42px; }
    </style>
</head>
<body>

    <div id="score-board">
        <div id="score-text">СЧЕТ: 0</div>
        <div id="speed-text">СКОРОСТЬ: 6.0000</div>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="640" height="440"></canvas>
        <div id="overlay">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <p>Нажми ПРОБЕЛ для перезапуска</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const scoreText = document.getElementById("score-text");
        const speedText = document.getElementById("speed-text");
        const CELL_SIZE = 20;

        // Автоматическое определение протокола хостинга Render (ws:// или wss://)
        
const ws = new WebSocket ("wss://snakegame-sg4l.onrender.com/ws")
        
        ws.onmessage = (event) => {
            const state = JSON.parse(event.data);
            
            scoreText.innerText = `СЧЕТ: ${state.score}`;
            speedText.innerText = `СКОРОСТЬ: ${state.fps.toFixed(4)}`;
            overlay.style.display = state.game_over ? "flex" : "none";

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Яблоко
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath();
            ctx.arc(state.apple[0] + CELL_SIZE/2, state.apple[1] + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Змейка
            state.snake.forEach((segment, i) => {
                ctx.fillStyle = i === 0 ? "#27ae60" : "#2ecc71";
                ctx.beginPath();
                ctx.arc(segment[0] + CELL_SIZE/2, segment[1] + CELL_SIZE/2, CELL_SIZE/2 - 1, 0, Math.PI * 2);
                ctx.fill();
            });
        };

        window.addEventListener("keydown", e => {
            let cmd = null;
            if (e.code === "Space") cmd = "SPACE";
            else if (e.code === "ArrowUp" || e.code === "KeyW") cmd = "UP";
            else if (e.code === "ArrowDown" || e.code === "KeyS") cmd = "DOWN";
            else if (e.code === "ArrowLeft" || e.code === "KeyA") cmd = "LEFT";
            else if (e.code === "ArrowRight" || e.code === "KeyD") cmd = "RIGHT";

            if (cmd && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ "cmd": cmd }));
            }
        });
    </script>
</body>
</html>
